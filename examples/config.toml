# Backward-compatible example. Prefer examples/default-config.toml.

[picker]
reuse_existing = true
create_missing = true
engine = "nucleo" # nucleo | skim | simple
source_order = ["agent", "server", "workspace", "project", "session", "zoxide", "root", "quick", "plugin"]
source_priority_boost = 5
agent_sort = "herdr" # herdr | priority | spaces
preview = true

[sources]
open_workspaces = true
herdr_plus_projects = true
zoxide = true
roots = true
agents = true
servers = true
sessions = true
herdr_plus_quick_actions = true

[theme]
inherit_herdr = true

[[roots]]
path = "~/workspace"
max_depth = 3

[[roots]]
path = "~/projects"
max_depth = 3

# [[agent_aliases]]
# alias = "main ai dot"
# agent = "claude"
# workspace = "Dotfiles"
# path = "dotfiles"

[sessions]
local = true

# Remote Herdr target. Selecting runs: herdr --remote prod-api --handoff.
