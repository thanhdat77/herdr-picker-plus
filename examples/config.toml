# Backward-compatible example. Prefer examples/default-config.toml.

[picker]
reuse_existing = true
create_missing = true
engine = "nucleo" # nucleo | skim | simple
source_order = ["workspace", "project", "zoxide", "root", "agent", "quick", "plugin"]
source_priority_boost = 25
agent_sort = "herdr" # herdr | priority | spaces

[sources]
open_workspaces = true
herdr_plus_projects = true
zoxide = true
roots = true
agents = true
herdr_plus_quick_actions = true

[theme]
inherit_herdr = true

[[roots]]
path = "~/workspace"
max_depth = 3

[[roots]]
path = "~/projects"
max_depth = 3

