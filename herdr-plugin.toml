id = "herdr-picker-plus"
name = "Picker Plus"
version = "0.1.2"
min_herdr_version = "0.7.0"
description = "Herdr-native picker plus: search workspaces, servers, agents, Herdr Plus projects, Herdr Plus Quick Actions, zoxide, and roots; then focus or create workspaces."
platforms = ["linux", "macos"]

[[build]]
command = ["cargo", "build", "--release"]

[[actions]]
id = "open"
title = "Picker Plus: open"
contexts = ["workspace", "global"]
command = ["./target/release/herdr-picker-plus", "open"]

[[panes]]
id = "picker"
title = "Picker Plus"
placement = "overlay"
command = ["./target/release/herdr-picker-plus", "ui"]
