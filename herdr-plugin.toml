id = "herdr-picker-plus"
name = "Herdr Navigator"
version = "0.3.1"
min_herdr_version = "0.7.3"
description = "Jump to any Herdr workspace, agent, project, session, remote, directory, or action from one fuzzy navigator."
platforms = ["linux", "macos"]

[[build]]
command = ["cargo", "build", "--release"]

[[actions]]
id = "open"
title = "Herdr Navigator: open"
contexts = ["workspace", "global"]
command = ["./target/release/herdr-picker-plus", "open"]

[[actions]]
id = "open-side"
title = "Herdr Navigator: side pane"
contexts = ["workspace", "global"]
command = ["./target/release/herdr-picker-plus", "open-side"]

[[actions]]
id = "jump-back"
title = "Herdr Navigator: jump back"
contexts = ["workspace", "global"]
command = ["./target/release/herdr-picker-plus", "jump-back"]

[[panes]]
id = "picker"
title = "Herdr Navigator"
placement = "overlay"
command = ["./target/release/herdr-picker-plus", "ui"]

# Persistent side pane variant: stays open after Enter, toggled by the open-side
# action (launch-or-focus, close when already focused). Title must stay in sync
# with SIDE_PANE_LABEL in src/main.rs.
[[panes]]
id = "picker-side"
title = "Navigator Side"
placement = "split"
command = ["./target/release/herdr-picker-plus", "ui", "--side"]
