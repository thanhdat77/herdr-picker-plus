name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-latest
            name: macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: Package
        shell: bash
        run: |
          mkdir -p dist/herdr-picker-plus
          cp target/release/herdr-picker-plus dist/herdr-picker-plus/
          cp README.md LICENSE CHANGELOG.md herdr-plugin.toml dist/herdr-picker-plus/
          cp -R examples dist/herdr-picker-plus/
          tar -C dist -czf herdr-picker-plus-${{ matrix.name }}.tar.gz herdr-picker-plus
      - uses: softprops/action-gh-release@v2
        with:
          files: herdr-picker-plus-${{ matrix.name }}.tar.gz
          generate_release_notes: true
